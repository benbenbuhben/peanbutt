<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAV4 Finder &middot; 2026 inventory by stage</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<style>
  :root{--ink:#1d2230;--muted:#6b7280;--line:#e6e8ee;--bg:#f4f6f8;--card:#fff;--accent:#6d4bd8;
    --stock:#2c6e49;--stockbg:#e7f3ec;--transit:#b9791b;--transitbg:#fcf3e0;}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1280px;margin:0 auto;padding:20px 16px 70px}
  h1{font-size:clamp(1.5rem,4vw,2.1rem);margin:0 0 4px}
  .sub{color:var(--muted);font-size:.95rem;margin:0 0 8px;line-height:1.45}
  .legend{display:flex;flex-wrap:wrap;gap:8px 14px;font-size:.8rem;color:var(--muted);align-items:center;margin:6px 0 2px}
  .lg{display:inline-flex;align-items:center;gap:6px}
  .badge{display:inline-block;border-radius:999px;padding:2px 9px;font-size:.72rem;font-weight:700;border:1.5px solid transparent}
  .b-stock{background:var(--stockbg);color:var(--stock);border-color:#bfe0cd}
  .b-transit{background:var(--transitbg);color:var(--transit);border-color:#ecd49a}
  .b-unconf{background:#fff;border-style:dashed}
  .b-sold{background:#fbeae7;color:#b0362a;border-color:#e6b3aa}
  .card.sold{opacity:.72}
  .wheelpill{display:inline-flex;align-items:center;gap:4px;font-size:.74rem;font-weight:700;color:#3a4150;background:#f0f1f5;border:1px solid var(--line);border-radius:7px;padding:2px 7px;align-self:flex-start}
  .wheelpill.up{color:#fff;background:var(--accent);border-color:var(--accent)}
  .filters{position:sticky;top:0;z-index:30;background:rgba(244,246,248,.96);backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin:14px 0;display:flex;flex-wrap:wrap;gap:12px 18px;align-items:flex-end}
  .fg{display:flex;flex-direction:column;gap:5px}
  .lab{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chk{display:inline-flex;align-items:center;gap:5px;font-size:.85rem;background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 9px;cursor:pointer;user-select:none}
  .chk input{accent-color:var(--accent)}
  select{padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:#fff;font:inherit}
  /* multiselect dropdown */
  .ms{position:relative}
  .ms-btn{font:inherit;padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;min-width:130px;justify-content:space-between}
  .ms-sum{color:var(--muted)}
  .ms-pop{position:absolute;top:calc(100% + 4px);left:0;z-index:40;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 24px rgba(20,28,48,.13);padding:6px;min-width:180px;max-height:300px;overflow:auto}
  .ms-opt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:.88rem;white-space:nowrap}
  .ms-opt:hover{background:#f5f6fa}
  .sw{display:inline-block;width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.18);flex:none}
  .count{margin-left:auto;font-weight:700;font-size:.9rem;align-self:center}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(266px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(20,28,48,.04)}
  .imgwrap{position:relative;background:linear-gradient(180deg,#fafbfc,#eef1f5);aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .imgwrap img{width:100%;height:100%;object-fit:cover}
  .ph{font-size:.8rem;color:#9aa1ad;font-weight:600;text-align:center;padding:0 10px}
  .stwrap{position:absolute;top:8px;left:8px}
  .ptpill{position:absolute;top:8px;right:8px;border-radius:999px;padding:3px 8px;font-size:.66rem;font-weight:700}
  .hev{background:#eaf3ee;color:#2c6e49} .phev{background:#eef0fb;color:#4a40b5}
  .body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:6px;flex:1}
  .ttl{font-weight:700;font-size:1rem;line-height:1.2}
  .price{font-size:1.12rem;font-weight:800}.price small{font-weight:600;color:var(--muted);font-size:.7rem}
  .eta{font-size:.76rem;color:var(--transit)}
  .colorrow{display:flex;gap:12px;font-size:.82rem;color:#3a4150;flex-wrap:wrap}
  .colorrow .tan{font-weight:700;color:#9a6a12}
  .meta{margin-top:auto;font-size:.8rem;color:var(--muted);display:flex;justify-content:space-between;gap:8px;align-items:flex-end}
  .vin{font-size:.66rem;color:#9aa1ad;word-break:break-all}
  .vin a{color:var(--accent);text-decoration:none;font-weight:600}
  footer{margin-top:30px;color:var(--muted);font-size:.8rem;line-height:1.55}
  @media(max-width:520px){.count{margin-left:0;width:100%}.ms-btn{min-width:110px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>RAV4 Finder &middot; 2026 by stage</h1>
  <p class="sub" id="subline"></p>
  <div class="legend">
    <span class="lg"><span class="badge b-stock">In Stock</span> on the lot</span>
    <span class="lg"><span class="badge b-transit">In Transit</span> shipping to dealer</span>
    <span class="lg"><span class="badge b-transit b-unconf">unconfirmed</span> from Toyota's national feed (dealer not directly checked)</span>
    <span class="lg"><span class="badge b-sold">Spoken for</span> pre-sold in Toyota's feed &mdash; hidden by default, toggle to show</span>
  </div>

  <div class="filters">
    <div class="fg"><span class="lab">Trim</span><div class="chips" id="trimChips">
      <label class="chk"><input type="checkbox" value="Limited" checked>Limited</label>
      <label class="chk"><input type="checkbox" value="XLE Premium" checked>XLE Premium</label>
      <label class="chk"><input type="checkbox" value="Woodland" checked>Woodland</label>
    </div></div>
    <div class="fg"><span class="lab">Powertrain</span>
      <select id="pt"><option value="">All</option><option value="0">Hybrid</option><option value="1">Plug-in</option></select></div>
    <div class="fg"><span class="lab">Exterior</span>
      <div class="ms" id="msExt"><button class="ms-btn" type="button">Exterior <span class="ms-sum">All</span> &#9662;</button><div class="ms-pop" hidden></div></div></div>
    <div class="fg"><span class="lab">Interior</span>
      <div class="ms" id="msInt"><button class="ms-btn" type="button">Interior <span class="ms-sum">All</span> &#9662;</button><div class="ms-pop" hidden></div></div></div>
    <div class="fg"><span class="lab">Wheels</span>
      <select id="wheels"><option value="">All</option><option value="18-in">18-in</option><option value="20-in">20-in (pkg)</option></select></div>
    <div class="fg"><span class="lab">Max dist: <span id="distVal">500</span> mi</span>
      <input type="range" id="dist" min="25" max="500" step="25" value="500" style="width:150px"></div>
    <div class="fg"><span class="lab">Sort</span>
      <select id="sort"><option value="dist">Nearest</option><option value="plo">Price: low</option><option value="phi">Price: high</option></select></div>
    <div class="fg"><span class="lab">&nbsp;</span><label class="chk"><input type="checkbox" id="stockOnly">In stock only</label></div>
    <div class="fg"><span class="lab">&nbsp;</span><label class="chk"><input type="checkbox" id="confOnly">Dealer-confirmed only</label></div>
    <div class="fg"><span class="lab">&nbsp;</span><label class="chk"><input type="checkbox" id="showSold">Show spoken-for</label></div>
    <div class="count" id="count"></div>
  </div>

  <div class="grid" id="grid"></div>
  <footer id="foot"></footer>
</div>

const META={"total": 320, "verified": 155, "fallback": 165, "inStock": 54, "inTransit": 266, "extfams": ["Ice Cap", "Storm Cloud", "Wind Chill Pearl", "Midnight Black Metallic", "Meteor Shower", "Ruby Flare Pearl", "Everest", "Urban Rock", "Blueprint", "not listed"], "intfams": ["Black", "Gray", "Tan", "Other"], "exthex": {"Ice Cap": "#dfe7ec", "Storm Cloud": "#3d4a59", "Wind Chill Pearl": "#edeef0", "Midnight Black Metallic": "#1b1b1d", "Meteor Shower": "#6d5d4e", "Ruby Flare Pearl": "#7e1620", "Everest": "#e6e3dd", "Urban Rock": "#5a5e62", "Blueprint": "#27416b", "not listed": "#b9bcc2"}, "inthex": {"Black": "#222", "Tan": "#cdb38b", "Other": "#b9bcc2", "Gray": "#8b8f96"}, "pulled": "2026-06-25"};
const $=id=>document.getElementById(id);
const money=n=> n==null?'&mdash;':'$'+Math.round(n).toLocaleString('en-US');
const selExt=new Set(), selInt=new Set();

function buildMS(wrapId, options, hexmap, selSet){
  const wrap=$(wrapId), pop=wrap.querySelector('.ms-pop'), sum=wrap.querySelector('.ms-sum');
  pop.innerHTML=options.map(o=>`<label class="ms-opt"><input type="checkbox" value="${o}"><span class="sw" style="background:${hexmap[o]||'#bbb'}"></span>${o}</label>`).join('');
  wrap.querySelector('.ms-btn').addEventListener('click',e=>{e.stopPropagation();
    document.querySelectorAll('.ms-pop').forEach(p=>{if(p!==pop)p.hidden=true}); pop.hidden=!pop.hidden;});
  pop.addEventListener('click',e=>e.stopPropagation());
  pop.querySelectorAll('input').forEach(inp=>inp.addEventListener('change',()=>{
    inp.checked?selSet.add(inp.value):selSet.delete(inp.value);
    sum.textContent=selSet.size?selSet.size+' picked':'All'; render();}));
}
document.addEventListener('click',()=>document.querySelectorAll('.ms-pop').forEach(p=>p.hidden=true));
buildMS('msExt', META.extfams, META.exthex, selExt);
buildMS('msInt', META.intfams, META.inthex, selInt);

function render(){
  const trims=[...$('trimChips').querySelectorAll('input:checked')].map(c=>c.value);
  const pt=$('pt').value, maxd=+$('dist').value, sort=$('sort').value;
  const stockOnly=$('stockOnly').checked, confOnly=$('confOnly').checked;
  const wheels=$('wheels').value, showSold=$('showSold').checked;
  let rows=DATA.filter(c=>{
    if(!trims.includes(c.trim))return false;
    if(pt!==''&&String(c.phev)!==pt)return false;
    if(selExt.size&&!selExt.has(c.ext))return false;
    if(selInt.size&&!selInt.has(c.intfam))return false;
    if(wheels&&c.wheels!==wheels)return false;
    if(c.dist>maxd)return false;
    if(stockOnly&&c.stage!=='In Stock')return false;
    if(confOnly&&!c.verified)return false;
    return true;
  });
  const soldHidden=showSold?0:rows.filter(c=>c.presold).length;
  if(!showSold)rows=rows.filter(c=>!c.presold);
  rows.sort((a,b)=> sort==='plo'?(a.msrp||9e9)-(b.msrp||9e9): sort==='phi'?(b.msrp||0)-(a.msrp||0)
    : (a.dist-b.dist)||(b.verified-a.verified)||(a.msrp||0)-(b.msrp||0));
  $('count').innerHTML=rows.length+' of '+DATA.length+(soldHidden?` &middot; <span style="color:#b0362a">${soldHidden} spoken-for hidden</span>`:'');
  $('grid').innerHTML=rows.map(card).join('')||'<p style="color:#6b7280">No matches &mdash; loosen the filters.</p>';
}
function card(c){
  const stcls=c.stage==='In Stock'?'b-stock':'b-transit';
  const badge=`<span class="badge ${stcls}${c.verified?'':' b-unconf'}" ${c.verified?'':'title="From the Toyota national feed; not dealer-confirmed"'}>${c.stage}${c.verified?'':' ?'}</span>`;
  const sold=c.presold?` <span class="badge b-sold" title="Marked pre-sold in Toyota's feed">Spoken for</span>`:'';
  const pt=c.phev?'<span class="ptpill phev">PLUG-IN</span>':'<span class="ptpill hev">HYBRID</span>';
  const img=c.photo?`<img loading="lazy" src="${c.photo}" alt="${c.yr} RAV4 ${c.trim} ${c.ext}">`:`<div class="ph">${c.yr} RAV4 ${c.trim}<br>${c.ext}</div>`;
  const eta=(c.stage==='In Transit'&&c.eta)?`<div class="eta">ETA ${c.eta}</div>`:'';
  const tan=/Tan/.test(c.intfam)?' class="tan"':'';
  const wheel=`<span class="wheelpill${c.wheels==='20-in'?' up':''}" title="${c.wheels==='20-in'?'20-in Wheel Package (Limited upgrade)':'Standard 18-in alloy wheels'}">${c.wheels} wheels${c.wheels==='20-in'?' &middot; pkg':''}</span>`;
  const link=c.vdp?`<a href="${c.vdp}" target="_blank" rel="noopener">view listing &rsaquo;</a>`:('VIN '+c.vin);
  return `<div class="card${c.presold?' sold':''}">
    <div class="imgwrap">${img}<span class="stwrap">${badge}${sold}</span>${pt}</div>
    <div class="body">
      <div class="ttl">${c.yr} RAV4${c.phev?' Plug-in':''} ${c.trim}</div>
      ${eta}
      <div class="price">${money(c.msrp)} <small>${c.verified?'MSRP':'MSRP*'}</small></div>
      <div class="colorrow">
        <span><span class="sw" style="background:${c.exthex}"></span> ${c.ext}</span>
        <span${tan}><span class="sw" style="background:${c.inthex}"></span> ${c.int}</span>
      </div>
      <div>${wheel}</div>
      <div class="meta"><span>${c.dealer||''}</span><span><b>${c.dist} mi</b></span></div>
      <div class="vin">${link}</div>
    </div></div>`;
}
$('subline').innerHTML=`${META.total} new 2026 RAV4s (Limited / XLE Premium / Woodland) within 500 mi of 98103, by availability. `+
  `<b>${META.verified}</b> pulled live from each dealer with confirmed stage; <b>${META.fallback}</b> from Toyota's national feed (stage marked <i>unconfirmed</i>). `+
  `The redesigned RAV4 has no gas-only model &mdash; every one is a hybrid or plug-in hybrid.`;
$('foot').innerHTML='Stage (In Stock vs In Transit) is read live from each dealer site where reachable; the rest come from the Toyota national inventory feed, which lags dealers and cannot be confirmed (shown with a dashed <span class="badge b-transit b-unconf" style="font-size:.66rem">unconfirmed</span> badge &mdash; <b>*MSRP</b> likewise). Build-phase / "Coming Soon" factory orders are excluded. Cars flagged pre-sold in Toyota\'s feed are hidden by default (toggle <i>Show spoken-for</i>) &mdash; that flag isn\'t perfect, so a very recently sold car can still slip through; confirm by phone. Wheel size comes from the factory options: <b>20-in</b> = the Limited 20-in Wheel Package; every other trim is standard <b>18-in</b>. Pulled '+META.pulled+'. Prices and availability move fast &mdash; confirm with the dealer (have the VIN ready).';
['trimChips','pt','sort','stockOnly','confOnly','wheels','showSold'].forEach(id=>$(id).addEventListener('change',render));
$('dist').addEventListener('input',()=>{$('distVal').textContent=$('dist').value;render();});
render();
</script>
</body></html>
